<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart - Burger Blast</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

<nav class="navbar" id="navbar">...</nav>

<section class="page-header"><div class="container"><h1>Your Cart</h1><p>Review & checkout</p></div></section>

<section class="cart-section">
  <div class="container cart-container">
    <div class="cart-items" id="cartItemsList"><p>Your cart is empty. <a href="menu.html">Order now!</a></p></div>
    <div class="cart-summary"><h3>Order Summary</h3><div class="summary-details"><p>Subtotal: <span id="cartSubtotal">₹0</span></p><p>Tax (5%): <span id="cartTax">₹0</span></p><p><strong>Total: <span id="cartTotal">₹0</span></strong></p></div><button id="proceedCheckoutBtn" class="btn-primary">Proceed to Checkout</button></div>
  </div>
</section>

<section class="checkout-form" id="checkoutSection" style="display:none;"><div class="container"><h2>Checkout Details</h2><form id="checkoutForm"><input type="text" id="fullName" placeholder="Full Name" required><input type="tel" id="phone" placeholder="Phone Number" required><textarea id="address" placeholder="Delivery Address" required></textarea><select id="paymentMethod" required><option value="">Select Payment</option><option value="card">Credit/Debit Card</option><option value="cod">Cash on Delivery</option></select><button type="submit" class="btn-primary">Place Order</button><p id="orderFeedback"></p></form></div></section>

<footer>...</footer>
<a href="https://wa.me/1234567890" class="whatsapp-float" target="_blank"><i class="fab fa-whatsapp"></i></a>
<script src="js/script.js"></script>
</body>
</html>
