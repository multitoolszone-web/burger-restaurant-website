<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Burger Blast</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<nav class="navbar" id="navbar">...</nav>

<section class="page-header">
  <div class="container"><h1>Get In Touch</h1><p>We'd love to hear from you!</p></div>
</section>

<section class="contact-section">
  <div class="container contact-wrapper">
    <div class="contact-info"><h2>📍 Visit Us</h2><p><i class="fas fa-map-marker-alt"></i> 123 Flavor Avenue, New York, NY 10001</p><p><i class="fas fa-phone"></i> +1 (555) 123-4567</p><p><i class="fas fa-envelope"></i> hello@burgerblast.com</p><h3>Opening Hours</h3><p>Mon-Sun: 11:00 AM - 11:00 PM</p></div>
    <div class="contact-form"><h2>Send a Message</h2><form id="contactForm"><input type="text" id="contactName" placeholder="Your Name" required><input type="email" id="contactEmail" placeholder="Email Address" required><textarea id="contactMsg" rows="4" placeholder="Your Message" required></textarea><button type="submit" class="btn-primary">Send Message</button><p id="formFeedback" class="feedback-msg"></p></form></div>
  </div>
</section>

<section class="map"><div class="container"><iframe src="https://maps.google.com/maps?q=New%20York&t=&z=13&ie=UTF8&iwloc=&output=embed" width="100%" height="350" style="border:0;" allowfullscreen="" loading="lazy"></iframe></div></section>

<footer>...</footer>
<a href="https://wa.me/1234567890" class="whatsapp-float" target="_blank"><i class="fab fa-whatsapp"></i></a>
<script src="js/script.js"></script>
</body>
</html>
